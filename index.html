<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulut Görüşme</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #000; }
        ::-webkit-scrollbar { display: none; }
        /* Videoları ayna gibi çevirir (daha doğal görünüm için) */
        .mirror { transform: scaleX(-1); }
    </style>
</head>
<body class="min-h-screen flex flex-col text-white">

    <header class="p-6 text-center z-10 absolute top-0 w-full bg-gradient-to-b from-black/70 to-transparent">
        <h1 class="text-2xl font-semibold tracking-tight">Görüntülü Görüşme</h1>
        <p id="statusText" class="text-gray-300 text-sm mt-1">Kamerayı başlatmak için aşağıdaki butona tıkla</p>
    </header>

    <main class="flex-1 relative w-full h-full flex justify-center items-center bg-gray-900 overflow-hidden">
        <video id="remoteVideo" class="absolute w-full h-full object-cover" autoplay playsinline></video>
        
        <video id="webcamVideo" class="absolute bottom-24 right-6 w-32 md:w-48 h-48 md:h-72 object-cover bg-gray-800 rounded-2xl shadow-2xl border-2 border-gray-700 mirror z-20" autoplay playsinline muted></video>
    </main>

    <footer class="p-6 pb-8 bg-gray-950 border-t border-gray-800 z-10 absolute bottom-0 w-full flex flex-col items-center gap-4 rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
        
        <button id="webcamButton" class="bg-blue-600 hover:bg-blue-500 text-white font-medium py-3 px-8 rounded-full transition-all w-full max-w-sm">
            Kamera ve Mikrofonu Aç
        </button>

        <div id="callControls" class="hidden flex-col w-full max-w-sm gap-3">
            <button id="callButton" class="bg-green-600 hover:bg-green-500 text-white font-medium py-3 px-8 rounded-full transition-all">
                Yeni Oda Oluştur
            </button>
            
            <div class="flex gap-2">
                <input id="callInput" class="flex-1 bg-gray-800 border border-gray-700 rounded-full px-5 py-3 focus:outline-none focus:border-blue-500 text-center" placeholder="Oda Kodunu Gir" />
                <button id="answerButton" class="bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-3 px-6 rounded-full transition-all">
                    Katıl
                </button>
            </div>
        </div>

        <button id="hangupButton" class="hidden bg-red-600 hover:bg-red-500 text-white font-medium py-3 px-8 rounded-full transition-all w-full max-w-sm">
            Görüşmeyi Sonlandır
        </button>

    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, addDoc, getDoc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Senin Firebase Ayarların
        const firebaseConfig = {
            apiKey: "AIzaSyDcUDxYBLp97h5leXJMsFCfCS3pDq2OqaE",
            authDomain: "notlarim-5705d.firebaseapp.com",
            projectId: "notlarim-5705d",
            storageBucket: "notlarim-5705d.firebasestorage.app",
            messagingSenderId: "132462317345",
            appId: "1:132462317345:web:86c6fb946892e681d6f860"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // WebRTC Sunucuları (Google'ın ücretsiz sunucuları - sadece cihazları tanıştırmak için kullanılır)
        const servers = { iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] };

        let pc = new RTCPeerConnection(servers);
        let localStream = null;
        let remoteStream = null;

        const webcamButton = document.getElementById('webcamButton');
        const callButton = document.getElementById('callButton');
        const callInput = document.getElementById('callInput');
        const answerButton = document.getElementById('answerButton');
        const hangupButton = document.getElementById('hangupButton');
        const callControls = document.getElementById('callControls');
        const statusText = document.getElementById('statusText');

        // 1. Kamera ve Mikrofonu Başlat
        webcamButton.onclick = async () => {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                remoteStream = new MediaStream();

                localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
                pc.ontrack = event => event.streams[0].getTracks().forEach(track => remoteStream.addTrack(track));

                document.getElementById('webcamVideo').srcObject = localStream;
                document.getElementById('remoteVideo').srcObject = remoteStream;

                webcamButton.classList.add('hidden');
                callControls.classList.remove('hidden');
                statusText.textContent = "Hazır! Bir oda oluştur veya katıl.";
            } catch (error) {
                alert("Kamera izni reddedildi veya cihaz bulunamadı!");
            }
        };

        // 2. Yeni Oda Oluştur (Arayan Kişi)
        callButton.onclick = async () => {
            callControls.classList.add('hidden');
            hangupButton.classList.remove('hidden');
            
            const callDoc = doc(collection(db, 'calls'));
            const offerCandidates = collection(callDoc, 'offerCandidates');
            const answerCandidates = collection(callDoc, 'answerCandidates');

            callInput.value = callDoc.id; // Oda kodunu ekrana yaz
            statusText.innerHTML = `Oda Kodun: <span class="text-blue-400 font-bold tracking-widest bg-gray-800 px-2 py-1 rounded">${callDoc.id}</span> (Arkadaşına Gönder)`;

            pc.onicecandidate = event => { event.candidate && addDoc(offerCandidates, event.candidate.toJSON()); };

            const offerDescription = await pc.createOffer();
            await pc.setLocalDescription(offerDescription);
            await setDoc(callDoc, { offer: { type: offerDescription.type, sdp: offerDescription.sdp } });

            // Karşı tarafın cevabını bekle
            onSnapshot(callDoc, snapshot => {
                const data = snapshot.data();
                if (!pc.currentRemoteDescription && data?.answer) {
                    const answerDescription = new RTCSessionDescription(data.answer);
                    pc.setRemoteDescription(answerDescription);
                }
            });

            // Karşı tarafın ağ bağlantı noktalarını bekle
            onSnapshot(answerCandidates, snapshot => {
                snapshot.docChanges().forEach(change => {
                    if (change.type === 'added') pc.addIceCandidate(new RTCIceCandidate(change.doc.data()));
                });
            });
        };

        // 3. Odaya Katıl (Aranan Kişi)
        answerButton.onclick = async () => {
            const callId = callInput.value.trim();
            if(!callId) return alert("Lütfen bir oda kodu girin!");

            callControls.classList.add('hidden');
            hangupButton.classList.remove('hidden');
            statusText.textContent = "Bağlanıyor...";

            const callDoc = doc(db, 'calls', callId);
            const offerCandidates = collection(callDoc, 'offerCandidates');
            const answerCandidates = collection(callDoc, 'answerCandidates');

            pc.onicecandidate = event => { event.candidate && addDoc(answerCandidates, event.candidate.toJSON()); };

            const callData = (await getDoc(callDoc)).data();
            if (!callData) return alert("Oda bulunamadı!");

            const offerDescription = callData.offer;
            await pc.setRemoteDescription(new RTCSessionDescription(offerDescription));

            const answerDescription = await pc.createAnswer();
            await pc.setLocalDescription(answerDescription);
            await updateDoc(callDoc, { answer: { type: answerDescription.type, sdp: answerDescription.sdp } });

            onSnapshot(offerCandidates, snapshot => {
                snapshot.docChanges().forEach(change => {
                    if (change.type === 'added') pc.addIceCandidate(new RTCIceCandidate(change.doc.data()));
                });
            });
            statusText.textContent = "Görüşme Başladı";
        };

        // 4. Görüşmeyi Sonlandır
        hangupButton.onclick = () => {
            window.location.reload(); // En temiz çıkış yolu sayfayı yenilemektir
        };
    </script>
</body>
</html>
